<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Management - Neon Glow Alert</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #022c22 100%);
            --bg-card: rgba(30, 41, 59, 0.7);
            --primary-teal: #2dd4bf;
            --border-neon: rgba(45, 212, 191, 0.4); 
            --neon-glow: 0 0 10px rgba(45, 212, 191, 0.25);
            --danger: #f43f5e;
            --radius-xl: 24px;
            --radius-md: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-page);
            background-attachment: fixed;
            color: #f8fafc;
            padding: 20px 12px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .dashboard-container {
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* --- HEADER DASHBOARD --- */
        .main-header {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-neon);
            box-shadow: var(--neon-glow);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 25px;
            border-radius: var(--radius-xl);
            text-align: center;
        }

        .brand-title h1 { font-size: 1.6rem; font-weight: 800; color: #fff; letter-spacing: 0.5px; }
        
        /* --- ANIMASI TEKS BERKEDIP MERAH TERANG --- */
        .alert-text {
            font-size: 0.85rem;
            margin-top: 8px;
            font-weight: 600;
            line-height: 1.5;
            letter-spacing: 0.3px;
            animation: blinkRed 1.5s infinite ease-in-out;
        }

        @keyframes blinkRed {
            0%, 100% {
                color: #ff2a5f;
                text-shadow: 0 0 4px rgba(255, 42, 95, 0.3);
            }
            50% {
                color: #ffcbd7; /* Meredup ke warna pink sangat muda saat berkedip */
                text-shadow: 0 0 15px rgba(255, 42, 95, 0.8), 0 0 30px rgba(255, 42, 95, 0.4);
            }
        }

        /* --- CONTAINER KARTU --- */
        .wrapper-card {
            background: transparent;
            border-radius: var(--radius-xl);
            overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; }

        thead { display: none; } /* Tersembunyi untuk tampilan mobile card yang rapi */
        
        tr {
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding: 20px;
            background: var(--bg-card);
            border: 1.5px solid var(--border-neon);
            box-shadow: var(--neon-glow);
            border-radius: var(--radius-xl);
            margin-bottom: 20px;
        }

        td {
            display: block;
            width: 100% !important;
            padding: 0 !important;
            border: none !important;
            background: transparent !important;
        }

        .bg-header-mobile {
            padding-bottom: 15px !important;
            border-bottom: 1px solid var(--border-neon) !important;
            margin-bottom: 5px;
        }

        .day-group-cell {
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
            text-align: center;
        }
        
        .day-label-main { 
            font-weight: 800; 
            font-size: 1.4rem; 
            color: var(--primary-teal); 
            text-shadow: 0 0 10px rgba(45, 212, 191, 0.4); 
            text-transform: uppercase; 
            margin-bottom: 5px;
        }

        /* --- FORM CONTROLS --- */
        .form-input-time, .form-select-custom, .form-input-date {
            border: 1.5px solid var(--border-neon);
            box-shadow: var(--neon-glow);
            border-radius: var(--radius-md);
            padding: 12px; font-family: inherit; font-size: 1rem; font-weight: 600;
            width: 100%; text-align: center; color: #ffffff !important;
            background-color: rgba(15, 23, 42, 0.8) !important;
            transition: all 0.25s ease-in-out;
            outline: none;
        }
        
        input[type="time"]::-webkit-calendar-picker-indicator,
        input[type="date"]::-webkit-calendar-picker-indicator { 
            filter: invert(1); 
            cursor: pointer;
        }

        .form-input-time:focus, .form-select-custom:focus, .form-input-date:focus {
            border-color: var(--primary-teal);
            box-shadow: 0 0 15px rgba(45, 212, 191, 0.6);
            background-color: rgba(20, 30, 50, 0.9) !important;
        }

        .active-overtime { 
            background-color: rgba(251, 191, 36, 0.1) !important; 
            color: #fbbf24 !important; 
            border-color: rgba(251, 191, 36, 0.6) !important; 
            box-shadow: 0 0 12px rgba(251, 191, 36, 0.3) !important;
        }

        .mobile-grid-time {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .label-mobile-only {
            display: block;
            font-size: 0.75rem;
            color: var(--primary-teal);
            text-transform: uppercase;
            font-weight: 800;
            margin-bottom: 6px;
            letter-spacing: 1px;
            text-shadow: 0 0 5px rgba(45, 212, 191, 0.3);
        }

        /* Tombol Hapus */
        .td-action {
            margin-top: 5px;
            padding-top: 15px !important;
            border-top: 1px solid var(--border-neon) !important;
        }

        .btn-delete-row {
            width: 100%;
            background-color: rgba(244, 63, 94, 0.05); color: var(--danger); 
            border: 1.5px solid rgba(244, 63, 94, 0.4);
            box-shadow: 0 0 8px rgba(244, 63, 94, 0.15);
            padding: 14px; border-radius: 12px; cursor: pointer; transition: 0.2s;
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            font-weight: 700; font-size: 0.85rem;
        }
        .btn-delete-row:hover { 
            background-color: var(--danger); color: white; 
            box-shadow: 0 0 15px rgba(244, 63, 94, 0.5);
            border-color: var(--danger);
        }

        /* Control Panel Utama */
        .control-panel { display: flex; flex-direction: column; align-items: center; padding: 10px 0; gap: 15px; }
        
        .btn-action {
            background: linear-gradient(135deg, #0d9488 0%, #115e59 100%);
            border: 1px solid var(--primary-teal);
            box-shadow: 0 5px 15px rgba(13, 148, 136, 0.3);
            color: white; padding: 16px 32px; font-size: 1rem;
            font-weight: 800; border-radius: 16px; cursor: pointer;
            display: inline-flex; align-items: center; gap: 12px;
            transition: 0.3s; width: 100%; justify-content: center;
        }
        .btn-action:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(45, 212, 191, 0.5); }
        .btn-reset-db { color: #94a3b8; background: none; border: none; cursor: pointer; font-weight: 600; text-decoration: underline; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <header class="main-header">
        <div class="brand-title">
            <h1>DATA KEHADIRAN KERJA</h1>
            <p class="alert-text">Selalu isi data kehadiran ini, untuh bahan data evaluasi dan rekapitulasi kehadiran kerja</p>
        </div>
    </header>
    
    <div class="wrapper-card">
        <table>
            <tbody id="attendance-rows"></tbody>
        </table>
    </div>
    
    <div class="control-panel">
        <button class="btn-action" onclick="tambahHariBaru()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            TAMBAH LOG HARI
        </button>
        <button class="btn-reset-db" onclick="hapusSemuaDataGlobal()">Reset Data</button>
    </div>
</div>

<script>
    const namaHariList = ["MINGGU", "SENIN", "SELASA", "RABU", "KAMIS", "JUMAT", "SABTU"];
    const CONFIG_START_DATE_STR = "2026-05-26"; 

    window.onload = function() { muatDataApp(); };

    function tambahHariBaru() {
        const tbody = document.getElementById('attendance-rows');
        let tanggalTarget = new Date(CONFIG_START_DATE_STR);

        if (tbody.rows.length > 0) {
            const lastDateVal = tbody.lastElementChild.querySelector('.form-input-date').value;
            if (lastDateVal) {
                tanggalTarget = new Date(lastDateVal);
                tanggalTarget.setDate(tanggalTarget.getDate() + 1);
            }
        }

        let yyyy = tanggalTarget.getFullYear();
        let mm = String(tanggalTarget.getMonth() + 1).padStart(2, '0');
        let dd = String(tanggalTarget.getDate()).padStart(2, '0');
        let stringTanggal = `${yyyy}-${mm}-${dd}`;

        renderBarisTabel({
            hari: namaHariList[tanggalTarget.getDay()],
            tanggal: stringTanggal,
            status: "MASUK",
            masuk: "",
            keluar: "",
            lembur: ""
        });
        simpanDataApp();
    }

    function renderBarisTabel(data) {
        const tbody = document.getElementById('attendance-rows');
        const row = tbody.insertRow(-1);

        row.innerHTML = `
            <td class="bg-header-mobile">
                <div class="day-group-cell">
                    <span class="day-label-main">${data.hari}</span>
                    <input type="date" class="form-input-date" value="${data.tanggal}" onchange="updateHariOtomatis(this)">
                </div>
            </td>
            <td>
                <span class="label-mobile-only">Status Kerja</span>
                <select class="form-select-custom" onchange="simpanDataApp()">
                    <option value="MASUK" ${data.status === "MASUK" ? 'selected' : ''}>✅ MASUK</option>
                    <option value="LIBUR" ${data.status === "LIBUR" ? 'selected' : ''}>🏠 LIBUR</option>
                    <option value="IZIN" ${data.status === "IZIN" ? 'selected' : ''}>📝 IZIN</option>
                    <option value="SAKIT" ${data.status === "SAKIT" ? 'selected' : ''}>🤒 SAKIT</option>
                </select>
            </td>
            <td class="mobile-grid-time">
                <div>
                    <span class="label-mobile-only">Jam Masuk</span>
                    <input type="time" class="form-input-time" value="${data.masuk}" onchange="simpanDataApp()">
                </div>
                <div>
                    <span class="label-mobile-only">Jam Keluar</span>
                    <input type="time" class="form-input-time" value="${data.keluar}" onchange="simpanDataApp()">
                </div>
            </td>
            <td>
                <span class="label-mobile-only">Lembur</span>
                <select class="select-overtime form-select-custom ${data.lembur ? 'active-overtime' : ''}" onchange="styleLembur(this); simpanDataApp()">
                    <option value="" ${data.lembur === "" ? 'selected' : ''}>- Tidak Lembur -</option>
                    <option value="1" ${data.lembur === "1" ? 'selected' : ''}>Lembur 1 jam</option>
                    <option value="2" ${data.lembur === "2" ? 'selected' : ''}>Lembur 2 jam</option>
                    <option value="3" ${data.lembur === "3" ? 'selected' : ''}>Lembur 3 jam</option>
                </select>
            </td>
            <td class="td-action">
                <button class="btn-delete-row" onclick="hapusSatuBaris(this)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                    Hapus Hari Ini
                </button>
            </td>
        `;
        styleLembur(row.querySelector('.select-overtime'));
    }

    function updateHariOtomatis(inputDateElement) {
        const row = inputDateElement.closest('tr');
        const tanggalDipilih = inputDateElement.value;
        if (tanggalDipilih) {
            const objekTanggal = new Date(tanggalDipilih);
            row.querySelector('.day-label-main').innerText = namaHariList[objekTanggal.getDay()];
        }
        simpanDataApp();
    }

    function hapusSatuBaris(btn) {
        if (confirm("Hapus catatan ini?")) { btn.closest('tr').remove(); simpanDataApp(); }
    }

    function simpanDataApp() {
        const rows = document.querySelectorAll('#attendance-rows tr');
        const storage = [];
        rows.forEach(row => {
            storage.push({
                hari: row.querySelector('.day-label-main').innerText,
                tanggal: row.querySelector('.form-input-date').value,
                status: row.querySelectorAll('.form-select-custom')[0].value,
                masuk: row.querySelectorAll('.form-input-time')[0].value,
                keluar: row.querySelectorAll('.form-input-time')[1].value,
                lembur: row.querySelector('.select-overtime').value
            });
        });
        localStorage.setItem('db_money_neon_glow_v13', JSON.stringify(storage));
    }

    function muatDataApp() {
        const data = localStorage.getItem('db_money_neon_glow_v13');
        if (data) { 
            JSON.parse(data).forEach(d => renderBarisTabel(d)); 
        } else { 
            renderBarisTabel({ hari: "SELASA", tanggal: CONFIG_START_DATE_STR, status: "MASUK", masuk: "", keluar: "", lembur: "" }); 
            simpanDataApp(); 
        }
    }

    function styleLembur(el) {
        if (!el) return;
        if (el.value !== "") el.classList.add('active-overtime');
        else el.classList.remove('active-overtime');
    }

    function hapusSemuaDataGlobal() {
        if (confirm("Reset seluruh data?")) { 
            localStorage.removeItem('db_money_neon_glow_v13'); 
            location.reload(); 
        }
    }
</script>

</body>
</html>
